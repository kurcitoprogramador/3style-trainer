<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#101216" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>3Style Trainer</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #101216;
      --bg-2: #141820;
      --surface: rgba(26, 30, 39, 0.82);
      --surface-2: rgba(33, 38, 49, 0.9);
      --surface-3: #1c212b;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);

      --text: #f4f7fb;
      --text-soft: #cbd3df;
      --muted: #8c96a6;

      --accent: #e9edf5;
      --success: #93b59d;
      --danger: #d49494;
      --warn: #c9b87a;

      --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.34);
      --shadow-md: 0 10px 28px rgba(0, 0, 0, 0.22);

      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;

      --font-sans: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 30%),
        linear-gradient(180deg, #13161c 0%, #101216 100%);
      color: var(--text);
      font-family: var(--font-sans);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.04), transparent 24%);
    }

    .screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity .22s ease, transform .22s ease;
    }

    .screen.hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    .glass {
      background: var(--surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }

    .btn-plain {
      border: 0;
      outline: 0;
      cursor: pointer;
      background: transparent;
      color: inherit;
      font: inherit;
    }

    /* Loading */
    #screen-loading { gap: 18px; }

    .loader-cube {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.82);
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .02em;
    }

    /* Error */
    #screen-error { gap: 16px; }

    .error-card {
      width: min(100%, 360px);
      border-radius: var(--radius-xl);
      padding: 26px 20px;
      text-align: center;
    }

    .error-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .btn-retry {
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
    }

    /* Home */
    #screen-home { gap: 30px; }

    .home-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .home-title {
      font-size: 42px;
      font-weight: 800;
      line-height: 0.98;
      text-align: center;
      letter-spacing: -.05em;
    }

    .home-title span {
      display: block;
      color: var(--text-soft);
    }

    .home-subtitle {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 700;
    }

    .btn-group {
      width: min(100%, 360px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn-main {
      padding: 20px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform .12s ease, border-color .18s ease, background .18s ease;
    }

    .btn-main:active { transform: scale(.985); }

    .btn-main:hover {
      border-color: var(--border-strong);
      background: rgba(35, 40, 52, 0.92);
    }

    .btn-main-inner {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .btn-main-label {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .btn-main-sub {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .btn-main-icon {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .btn-main-icon.memo-icon {
      font-size: 11px;
      letter-spacing: .01em;
      line-height: 1.1;
      text-align: center;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--muted);
    }

    .dot.ok {
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(147,181,157,0.10);
    }

    .dot.err {
      background: var(--danger);
      box-shadow: 0 0 0 6px rgba(212,148,148,0.10);
    }

    /* Sets */
    #screen-sets {
      justify-content: flex-start;
      padding: 0;
      gap: 0;
    }

    .sets-header {
      width: 100%;
      padding: 54px 24px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-back,
    .practice-back {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      font-size: 16px;
      font-weight: 800;
    }

    .sets-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.04em;
    }

    .sets-type-badge {
      margin-left: auto;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .sets-grid-wrap {
      width: 100%;
      padding: 0 24px;
      flex: 1;
      overflow-y: auto;
    }

    .sets-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding-bottom: 130px;
    }

    .set-chip {
      min-height: 58px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--text-soft);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      transition: transform .12s ease, background .18s ease, border-color .18s ease, color .18s ease;
    }

    .set-chip:active { transform: scale(.97); }

    .set-chip.selected {
      background: rgba(255,255,255,0.12);
      color: var(--accent);
      border-color: rgba(255,255,255,0.18);
    }

    .sets-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 20px 24px;
      background: linear-gradient(180deg, rgba(16,18,22,0), rgba(16,18,22,0.94) 26%, rgba(16,18,22,1) 100%);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .selected-count {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
    }

    .btn-start {
      width: 100%;
      min-height: 56px;
      border-radius: 18px;
      background: #eef2f8;
      color: #12151b;
      font-size: 16px;
      font-weight: 800;
      border: 0;
      transition: opacity .18s ease, transform .12s ease;
    }

    .btn-start:disabled { opacity: .4; }
    .btn-start:not(:disabled):active { transform: scale(.99); }

    /* Practice */
    #screen-practice {
      padding: 18px 18px 28px;
    }

    .practice-shell {
      width: 100%;
      height: 100%;
      border-radius: 34px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .practice-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .progress-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f1f4f9, #cfd7e3);
      transition: width .22s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .btn-timer {
      min-width: 92px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 0 14px;
    }

    .btn-timer.running {
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
    }

    .practice-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: center;
      position: relative;
    }

    .pair-display {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -.07em;
      line-height: 1;
    }

    .pair-separator {
      color: rgba(255,255,255,0.12);
    }

    .word-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 700;
    }

    .word-value {
      font-size: 17px;
      color: var(--text-soft);
      font-weight: 600;
      letter-spacing: -.02em;
      max-width: 290px;
      line-height: 1.35;
      min-height: 46px;
    }

    .alg-box {
      width: 100%;
      min-height: 120px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 18px;
      text-align: center;
      transition: border-color .18s ease, background .18s ease;
    }

    .alg-box.revealed {
      background: rgba(255,255,255,0.07);
      border-color: var(--border-strong);
    }

    .alg-hint {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .alg-text {
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: -.02em;
      font-weight: 600;
      color: var(--text);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .18s ease, transform .18s ease;
      word-break: break-word;
    }

    .alg-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tap-hint {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 4px;
    }

    .tap-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: rgba(255,255,255,0);
      z-index: 999;
      transition: background .08s ease;
    }

    .tap-flash.flash {
      background: rgba(255,255,255,0.04);
    }

    /* Done */
    #screen-done { gap: 18px; }

    .done-card {
      width: min(100%, 360px);
      border-radius: var(--radius-xl);
      padding: 28px 22px;
      text-align: center;
    }

    .done-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.05em;
      margin-bottom: 8px;
    }

    .done-time {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -.06em;
      margin-bottom: 8px;
    }

    .done-stats {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .done-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-secondary {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
    }

    /* ===================== MEMO M2 OP ===================== */

    #screen-memo {
      justify-content: flex-start;
      padding: 0;
    }

    .memo-header {
      width: 100%;
      padding: 54px 24px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .memo-header-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.04em;
    }

    .memo-phase-badge {
      margin-left: auto;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .memo-phase-badge.memo {
      background: rgba(147,181,157,0.15);
      color: var(--success);
      border: 1px solid rgba(147,181,157,0.25);
    }

    .memo-phase-badge.test {
      background: rgba(201,184,122,0.15);
      color: var(--warn);
      border: 1px solid rgba(201,184,122,0.25);
    }

    .memo-phase-badge.done {
      background: rgba(238,242,248,0.1);
      color: var(--accent);
      border: 1px solid rgba(238,242,248,0.2);
    }

    .memo-body {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 140px;
    }

    .memo-config-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .memo-config-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .memo-toggle-row {
      display: flex;
      gap: 10px;
    }

    .memo-toggle {
      flex: 1;
      padding: 14px 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      transition: all .15s ease;
    }

    .memo-toggle.active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.22);
      color: var(--accent);
    }

    .memo-toggle:active { transform: scale(.97); }

    .memo-length-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }

    .memo-length-label {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
    }

    .memo-length-val {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.04em;
      min-width: 28px;
      text-align: center;
    }

    .memo-length-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .memo-length-btn:active { transform: scale(.93); }

    .memo-note {
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .memo-note b { color: var(--text-soft); }

    .memo-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .memo-pairs-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .memo-pair-chip {
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    .memo-pair-chip .pair-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      position: absolute;
      top: 5px;
      left: 8px;
      letter-spacing: .04em;
    }

    .memo-pair-chip .pair-letters {
      margin-top: 8px;
    }

    .memo-pair-sep {
      color: rgba(255,255,255,0.2);
      font-size: 16px;
    }

    .test-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .test-progress-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .test-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #c9b87a, #e8dba8);
      transition: width .22s ease;
    }

    .test-progress-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .test-phase-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .test-inputs-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .test-pair-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }

    .test-pair-num {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
    }

    .test-input-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 8px 10px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      transition: border-color .15s, background .15s;
    }

    .test-input-wrap.active-slot {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.09);
    }

    .test-input-wrap.correct {
      border-color: rgba(147,181,157,0.5);
      background: rgba(147,181,157,0.08);
    }

    .test-input-wrap.wrong {
      border-color: rgba(212,148,148,0.5);
      background: rgba(212,148,148,0.08);
    }

    .test-letter-box {
      width: 22px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
    }

    .test-letter-box.empty {
      color: rgba(255,255,255,0.15);
    }

    .test-letter-box.correct-letter { color: var(--success); }
    .test-letter-box.wrong-letter { color: var(--danger); }

    .test-sep {
      font-size: 12px;
      color: rgba(255,255,255,0.15);
      font-weight: 700;
    }

    .test-answer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    #memoKeyboardCapture {
      position: fixed;
      top: -200px;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      font-size: 16px;
    }

    .result-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-pairs-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-pair-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);

    .result-pair-row.correct {
      border-color: rgba(147,181,157,0.3);
      background: rgba(147,181,157,0.06);
    }

    .result-pair-row.wrong {
      border-color: rgba(212,148,148,0.3);
      background: rgba(212,148,148,0.06);

    .result-pair-letters {

    .result-pair-icon {

    .result-score-card {

    }

      font-weight: 600;

    .memo-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 20px 28px;
      background: linear-gradient(180deg, rgba(16,18,22,0), rgba(16,18,22,0.94) 26%, rgba(16,18,22,1) 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .memo-footer-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
    }

    .animate-in {
      animation: slideUp .32s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }

    @media (max-width: 380px) {
      .sets-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .pair-display { font-size: 52px; }
      .home-title { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="tap-flash" id="tapFlash"></div>
  <input id="memoKeyboardCapture" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div class="loader-cube"></div>
    <div class="loader-text" id="loadingMsg">cargando datos...</div>
  </div>

  <!-- ERROR -->
  <div class="screen hidden" id="screen-error">
    <div class="error-card glass">
      <div class="error-title">Error de carga</div>
      <div class="error-msg" id="errorMsg">No se pudo cargar la información.</div>
      <button class="btn-retry btn-plain" onclick="loadData()">Reintentar</button>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen hidden" id="screen-home">
    <div class="home-top">
      <div class="home-title">3Style<span>Trainer</span></div>
      <div class="home-subtitle">Blind · 3-Style · BLD</div>
    </div>

    <div class="btn-group">
      <button class="btn-main glass btn-plain" onclick="openSetSelector('UF')">
        <div class="btn-main-inner">
          <div class="btn-main-label">Aristas</div>
          <div class="btn-main-sub">UF · buffer</div>
        </div>
        <div class="btn-main-icon">UF</div>
      </button>

      <button class="btn-main glass btn-plain" onclick="openSetSelector('UFR')">
        <div class="btn-main-inner">
          <div class="btn-main-label">Esquinas</div>
          <div class="btn-main-sub">UFR · buffer</div>
        </div>
        <div class="btn-main-icon">UFR</div>
      </button>

      <button class="btn-main glass btn-plain" onclick="openMemo()">
        <div class="btn-main-inner">
          <div class="btn-main-label">Memo M2 OP</div>
          <div class="btn-main-sub">Entrenador de memorización</div>
        </div>
        <div class="btn-main-icon memo-icon">M2<br/>OP</div>
      </button>
    </div>

    <div class="status-dot">
      <div class="dot ok" id="statusDot"></div>
      <span id="statusText">datos listos</span>
    </div>
  </div>

  <!-- SETS -->
  <div class="screen hidden" id="screen-sets">
    <div class="sets-header">
      <button class="btn-back glass btn-plain" onclick="showScreen('home')">‹</button>
      <div class="sets-title">Elige sets</div>
      <div class="sets-type-badge" id="setsTypeBadge">UF</div>
    </div>

    <div class="sets-grid-wrap">
      <div class="sets-grid" id="setsGrid"></div>
    </div>

    <div class="sets-footer">
      <div class="selected-count" id="selectedCount">0 sets · 0 pares</div>
      <button class="btn-start btn-plain" id="btnStart" disabled onclick="startPractice()">Empezar práctica</button>
    </div>
  </div>

  <!-- PRACTICE -->
  <div class="screen hidden" id="screen-practice" onclick="handleTap(event)">
    <div class="practice-shell glass">
      <div class="practice-topbar">
        <button class="practice-back glass btn-plain" onclick="confirmBack(event)">‹</button>

        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">0 / 0</div>
        </div>

        <button class="btn-timer btn-plain" id="btnTimer" onclick="toggleTimer(event)">▶ timer</button>
      </div>

      <div class="practice-center">
        <div class="pair-display">
          <span id="letterA">A</span>
          <span class="pair-separator">·</span>
          <span id="letterB">B</span>
        </div>

        <div class="word-label">Palabra asociada</div>
        <div class="word-value" id="wordValue">—</div>

        <div class="alg-box" id="algBox">
          <div class="alg-hint" id="algHint">Tap para revelar</div>
          <div class="alg-text" id="algText"></div>
        </div>

        <div class="tap-hint" id="tapHintText">TAP · REVEAL</div>
      </div>
    </div>
  </div>

  <!-- DONE -->
  <div class="screen hidden" id="screen-done">
    <div class="done-card glass">
      <div class="done-title">Sesión completa</div>
      <div class="done-time" id="doneTime">00:00</div>
      <div class="done-stats" id="doneStats">0 pares</div>

      <div class="done-actions">
        <button class="btn-start btn-plain" onclick="repeatSession()">Repetir sesión</button>
        <button class="btn-secondary btn-plain" onclick="showScreen('home')">Volver al inicio</button>
      </div>
    </div>
  </div>

  <!-- MEMO -->
  <div class="screen hidden" id="screen-memo">
    <div class="memo-header">
      <button class="btn-back glass btn-plain" onclick="memoGoHome()">‹</button>
      <div class="memo-header-title" id="memoHeaderTitle">Memo M2 OP</div>
      <div class="memo-phase-badge memo" id="memoPhaseBadge">CONFIG</div>
    </div>

    <div class="memo-body" id="memoBody"></div>

    <div class="memo-footer" id="memoFooter">
      <div class="memo-footer-hint" id="memoFooterHint"></div>
      <button class="btn-start btn-plain" id="memoBtnAction" onclick="memoAction()">Generar secuencia</button>
    </div>
  </div>

  <script>
    /* ============================================================
       3STYLE DATA
    ============================================================ */
    const URLS = {
      UF: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRHYLqZ6MAOo7inO-6FVeVdbUH7gHQHgzZE8UHr1uQwkewR3LLQKX01qfNZ2wU6g/pub?gid=405240257&single=true&output=csv',
      UFR: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRHYLqZ6MAOo7inO-6FVeVdbUH7gHQHgzZE8UHr1uQwkewR3LLQKX01qfNZ2wU6g/pub?gid=1045305092&single=true&output=csv',
      PARITY: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRHYLqZ6MAOo7inO-6FVeVdbUH7gHQHgzZE8UHr1uQwkewR3LLQKX01qfNZ2wU6g/pub?gid=327120672&single=true&output=csv',
      PAIRS: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRHYLqZ6MAOo7inO-6FVeVdbUH7gHQHgzZE8UHr1uQwkewR3LLQKX01qfNZ2wU6g/pub?gid=685671113&single=true&output=csv',
    };

    const STORAGE_KEY = '3style_dataset_v2';
    const SET_ORDER = ['F','P','B','A','G','U','N','I','C','H','O','K','Q','J','E','M','S','L','D','R','T','Y'];

    const DB = {
      UF: null,
      UFR: null,
      PAIRS: null,
      PARITY: null,
      UF_PAIRS: {},
      UFR_PAIRS: {},
    };

    let currentType = 'UF';
    let selectedSets = new Set();

    let session = {
      queue: [],
      done: 0,
      total: 0,
      current: null,
      phase: 'idle',
      timerRunning: false,
      timerSecs: 0,
      timerInterval: null,
      type: 'UF',
      sets: [],
    };

    function cleanKey(value) {
      const s = String(value ?? '').trim().toUpperCase();
      if (!s || ['NAN', 'NONE', 'NULL', 'UNDEFINED'].includes(s)) return null;
      return s;
    }

    function cleanValue(value) {
      const s = String(value ?? '').trim();
      if (!s) return null;
      if (['NAN', 'NONE', 'NULL', 'UNDEFINED'].includes(s.toUpperCase())) return null;
      return s;
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = '';
          continue;
        }

        if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(cell);
          if (row.some(c => String(c).trim() !== '')) rows.push(row);
          row = [];
          cell = '';
          continue;
        }

        cell += char;
      }

      row.push(cell);
      if (row.some(c => String(c).trim() !== '')) rows.push(row);

      if (!rows.length) return { headers: [], rows: [] };

      return {
        headers: rows[0].map(v => String(v ?? '').trim()),
        rows: rows.slice(1),
      };
    }

    function buildMatrix(csv) {
      const { headers, rows } = csv;
      const mat = {};

      for (let ci = 1; ci < headers.length; ci++) {
        const col = cleanKey(headers[ci]);
        if (!col) continue;
        if (!mat[col]) mat[col] = {};

        for (const row of rows) {
          const rowKey = cleanKey(row[0]);
          if (!rowKey) continue;
          const val = cleanValue(row[ci]);
          if (val) mat[col][rowKey] = val;
        }
      }

      return mat;
    }

    function buildPairs(matrix) {
      const pairs = {};
      for (const col of Object.keys(matrix)) {
        const targets = Object.keys(matrix[col]).filter(k => cleanValue(matrix[col][k]));
        if (targets.length) pairs[col] = targets;
      }
      return pairs;
    }

    function sortSets(sets) {
      return [...sets].sort((a, b) => {
        const ia = SET_ORDER.indexOf(a);
        const ib = SET_ORDER.indexOf(b);
        if (ia === -1 && ib === -1) return a.localeCompare(b);
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
      });
    }

    async function fetchCSV(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.text();
    }

    function saveDatasetToLocal() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          UF: DB.UF,
          UFR: DB.UFR,
          PAIRS: DB.PAIRS,
          PARITY: DB.PARITY,
          UF_PAIRS: DB.UF_PAIRS,
          UFR_PAIRS: DB.UFR_PAIRS,
        }));
      } catch (_) {}
    }

    function loadDatasetFromLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);

        DB.UF = data.UF || null;
        DB.UFR = data.UFR || null;
        DB.PAIRS = data.PAIRS || null;
        DB.PARITY = data.PARITY || null;
        DB.UF_PAIRS = data.UF_PAIRS || {};
        DB.UFR_PAIRS = data.UFR_PAIRS || {};

        return !!(DB.UF || DB.UFR);
      } catch (_) {
        return false;
      }
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      const el = document.getElementById('screen-' + name);
      if (el) el.classList.remove('hidden');
    }

    function setLoadingMsg(text) {
      const el = document.getElementById('loadingMsg');
      if (el) el.textContent = text;
    }

    function setStatus(ok, text) {
      const dot = document.getElementById('statusDot');
      const label = document.getElementById('statusText');

      dot.classList.remove('ok', 'err');
      dot.classList.add(ok ? 'ok' : 'err');
      label.textContent = text;
    }

    async function loadData() {
      showScreen('loading');
      setLoadingMsg('descargando datos...');
      setStatus(false, 'cargando datos...');

      try {
        const [ufText, ufrText, pairsText, parityText] = await Promise.all([
          fetchCSV(URLS.UF),
          fetchCSV(URLS.UFR),
          fetchCSV(URLS.PAIRS),
          fetchCSV(URLS.PARITY),
        ]);

        setLoadingMsg('procesando uf...');
        DB.UF = buildMatrix(parseCSV(ufText));

        setLoadingMsg('procesando ufr...');
        DB.UFR = buildMatrix(parseCSV(ufrText));

        setLoadingMsg('procesando letter pairs...');
        DB.PAIRS = buildMatrix(parseCSV(pairsText));

        setLoadingMsg('procesando parity...');
        DB.PARITY = buildMatrix(parseCSV(parityText));

        DB.UF_PAIRS = buildPairs(DB.UF);
        DB.UFR_PAIRS = buildPairs(DB.UFR);

        if (!Object.keys(DB.UF_PAIRS).length && !Object.keys(DB.UFR_PAIRS).length) {
          throw new Error('No se encontraron pares válidos');
        }

        saveDatasetToLocal();
        setStatus(true, 'datos listos');
        showScreen('home');
      } catch (e) {
        const localOk = loadDatasetFromLocal();

        if (localOk) {
          setStatus(true, 'modo local');
          showScreen('home');
          return;
        }

        document.getElementById('errorMsg').textContent =
          'No se pudo cargar: ' + e.message + '. Verifica los links CSV y tu conexión.';
        setStatus(false, 'error al cargar');
        showScreen('error');
      }
    }

    function openSetSelector(type) {
      currentType = type;
      selectedSets.clear();

      document.getElementById('setsTypeBadge').textContent = type;

      const pairs = type === 'UF' ? DB.UF_PAIRS : DB.UFR_PAIRS;
      const grid = document.getElementById('setsGrid');
      grid.innerHTML = '';

      const sets = sortSets(Object.keys(pairs));
      sets.forEach(setName => {
        const chip = document.createElement('button');
        chip.className = 'set-chip btn-plain animate-in';
        chip.textContent = setName;
        chip.onclick = () => toggleSet(setName, chip);
        grid.appendChild(chip);
      });

      updateSetFooter();
      showScreen('sets');
    }

    function toggleSet(setName, chip) {
      if (selectedSets.has(setName)) {
        selectedSets.delete(setName);
        chip.classList.remove('selected');
      } else {
        selectedSets.add(setName);
        chip.classList.add('selected');
      }
      updateSetFooter();
    }

    function updateSetFooter() {
      const pairs = currentType === 'UF' ? DB.UF_PAIRS : DB.UFR_PAIRS;
      let total = 0;

      selectedSets.forEach(setName => {
        total += (pairs[setName] || []).length;
      });

      document.getElementById('selectedCount').textContent =
        `${selectedSets.size} set${selectedSets.size !== 1 ? 's' : ''} · ${total} pares`;

      document.getElementById('btnStart').disabled = selectedSets.size === 0 || total === 0;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function startPractice() {
      const pairs = currentType === 'UF' ? DB.UF_PAIRS : DB.UFR_PAIRS;
      const allPairs = [];

      selectedSets.forEach(setName => {
        (pairs[setName] || []).forEach(target => {
          allPairs.push([setName, target]);
        });
      });

      if (!allPairs.length) {
        alert('No hay pares disponibles para esos sets.');
        return;
      }

      shuffle(allPairs);

      session = {
        queue: allPairs,
        done: 0,
        total: allPairs.length,
        current: null,
        phase: 'idle',
        timerRunning: false,
        timerSecs: 0,
        timerInterval: null,
        type: currentType,
        sets: sortSets([...selectedSets]),
      };

      resetTimer();
      showScreen('practice');
      nextPair();
    }

    function lookupAlg(a, b) {
      const mat = session.type === 'UF' ? DB.UF : DB.UFR;
      const col = cleanKey(a);
      const row = cleanKey(b);
      if (!col || !row) return null;
      return mat?.[col]?.[row] || null;
    }

    function lookupWord(a, b) {
      const col = cleanKey(a);
      const row = cleanKey(b);
      if (!col || !row) return null;
      return DB.PAIRS?.[col]?.[row] || null;
    }

    function nextPair() {
      if (!session.queue.length) {
        finishSession();
        return;
      }

      session.current = session.queue.shift();
      session.done += 1;
      session.phase = 'idle';

      const [a, b] = session.current;
      document.getElementById('letterA').textContent = a;
      document.getElementById('letterB').textContent = b;
      document.getElementById('wordValue').textContent = lookupWord(a, b) || '—';

      const box = document.getElementById('algBox');
      const text = document.getElementById('algText');
      const hint = document.getElementById('algHint');

      box.classList.remove('revealed');
      text.classList.remove('visible');
      text.textContent = '';
      hint.style.display = 'block';

      const pct = ((session.done - 1) / session.total) * 100;
      document.getElementById('progressFill').style.width = `${pct}%`;
      document.getElementById('progressLabel').textContent = `${session.done} / ${session.total}`;
      document.getElementById('tapHintText').textContent = 'TAP · REVEAL';
    }

    function revealAlg() {
      if (!session.current) return;

      session.phase = 'revealed';
      const [a, b] = session.current;
      const alg = lookupAlg(a, b);

      const box = document.getElementById('algBox');
      const text = document.getElementById('algText');
      const hint = document.getElementById('algHint');

      box.classList.add('revealed');
      hint.style.display = 'none';
      text.textContent = alg || 'No disponible';
      requestAnimationFrame(() => text.classList.add('visible'));

      document.getElementById('tapHintText').textContent = 'TAP · SIGUIENTE';
    }

    function flashScreen() {
      const flash = document.getElementById('tapFlash');
      flash.classList.add('flash');
      setTimeout(() => flash.classList.remove('flash'), 80);
    }

    function handleTap(e) {
      if (e.target.closest('.practice-back') || e.target.closest('.btn-timer')) return;
      flashScreen();
      if (session.phase === 'idle') {
        revealAlg();
      } else {
        nextPair();
      }
    }

    function toggleTimer(e) {
      e.stopPropagation();
      if (session.timerRunning) pauseTimer();
      else startTimer();
    }

    function startTimer() {
      if (session.timerRunning) return;
      session.timerRunning = true;
      const btn = document.getElementById('btnTimer');
      btn.classList.add('running');
      btn.textContent = '⏸ ' + formatTime(session.timerSecs);
      session.timerInterval = setInterval(() => {
        session.timerSecs++;
        btn.textContent = '⏸ ' + formatTime(session.timerSecs);
      }, 1000);
    }

    function pauseTimer() {
      session.timerRunning = false;
      clearInterval(session.timerInterval);
      session.timerInterval = null;
      const btn = document.getElementById('btnTimer');
      btn.classList.remove('running');
      btn.textContent = '▶ ' + formatTime(session.timerSecs);
    }

    function resetTimer() {
      clearInterval(session.timerInterval);
      session.timerInterval = null;
      session.timerRunning = false;
      session.timerSecs = 0;
      const btn = document.getElementById('btnTimer');
      btn.classList.remove('running');
      btn.textContent = '▶ timer';
    }

    function formatTime(totalSecs) {
      const m = Math.floor(totalSecs / 60).toString().padStart(2, '0');
      const s = (totalSecs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function finishSession() {
      pauseTimer();
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('doneTime').textContent = formatTime(session.timerSecs);
      document.getElementById('doneStats').textContent =
        `${session.total} pares · ${session.type} · sets: ${session.sets.join(', ')}`;
      showScreen('done');
    }

    function repeatSession() {
      const pairs = session.type === 'UF' ? DB.UF_PAIRS : DB.UFR_PAIRS;
      const allPairs = [];

      session.sets.forEach(setName => {
        (pairs[setName] || []).forEach(target => {
          allPairs.push([setName, target]);
        });
      });

      shuffle(allPairs);

      session.queue = allPairs;
      session.done = 0;
      session.total = allPairs.length;
      session.current = null;
      session.phase = 'idle';
      resetTimer();
      showScreen('practice');
      nextPair();
    }

    function confirmBack(e) {
      e.stopPropagation();
      pauseTimer();
      showScreen('home');
    }

    /* ============================================================
       MEMO M2 OP
    ============================================================ */
    const MEMO_EDGES_LETTERS = ['F','P','B','A','G','U','N','I','C','H','O','K','Q','J','E','M','S','L','D','R','T','Y'];
    const MEMO_CORNERS_LETTERS = ['F','I','C','E','A','J','T','B','M','K','G','P','N','H','D','S','Q','L','O','R','U'];

    const EDGE_FORBIDDEN_PAIRS = [
      ['A','B'], ['D','C'], ['F','E'], ['O','P'],
      ['I','J'], ['K','L'], ['M','N'], ['G','H'],
      ['R','Q'], ['S','T'], ['Y','U']
    ];

    const CORNER_FORBIDDEN_GROUPS = [
      ['A','B','C'],
      ['D','E','F'],
      ['I','G','H'],
      ['M','N','O'],
      ['P','Q','R'],
      ['S','T','U'],
      ['K','L','J']
    ];

    let memo = {
      phase: 'config',
      includeEdges: true,
      includeCorners: true,
      edgeCount: 10,
      cornerCount: 6,
      generatedEdges: [],
      generatedCorners: [],
      testPhase: null,
      currentTestPairIdx: 0,
      currentLetterIdx: 0,
      typedLetters: [],
      edgeResults: [],
      cornerResults: [],
    };

    function edgePairForbidden(a, b) {
      if (a === b) return true;
      return EDGE_FORBIDDEN_PAIRS.some(([x, y]) =>
        (x === a && y === b) || (x === b && y === a)
      );
    }

    function cornerPairForbidden(a, b) {
      if (a === b) return true;
      return CORNER_FORBIDDEN_GROUPS.some(group => group.includes(a) && group.includes(b));
    }

    function generatePairs(letters, forbiddenFn, count) {
      const pairs = [];
      let attempts = 0;

      while (pairs.length < count && attempts < 5000) {
        attempts++;
        const a = letters[Math.floor(Math.random() * letters.length)];
        const b = letters[Math.floor(Math.random() * letters.length)];
        if (forbiddenFn(a, b)) continue;

        const last = pairs[pairs.length - 1];
        if (last && last[0] === a && last[1] === b) continue;

        pairs.push([a, b]);
      }

      return pairs;
    }

    function openMemo() {
      memo.phase = 'config';
      renderMemo();
      showScreen('memo');
    }

    function memoGoHome() {
      blurKeyboard();
      showScreen('home');
    }

    function setMemoBadge(text, mode) {
      const badge = document.getElementById('memoPhaseBadge');
      badge.className = 'memo-phase-badge ' + mode;
      badge.textContent = text;
    }

    function renderMemo() {
      const body = document.getElementById('memoBody');
      const footer = document.getElementById('memoFooter');
      const btn = document.getElementById('memoBtnAction');
      const hint = document.getElementById('memoFooterHint');
      const headerTitle = document.getElementById('memoHeaderTitle');

      body.innerHTML = '';
      btn.style.display = 'flex';
      btn.disabled = false;
      footer.style.display = 'flex';

      if (memo.phase === 'config') {
        setMemoBadge('CONFIG', 'memo');
        headerTitle.textContent = 'Memo M2 OP';
        hint.textContent = '';
        btn.textContent = 'Generar secuencia';
        renderMemoConfig(body);
        return;
      }

      if (memo.phase === 'memo-corners') {
        setMemoBadge('MEMO', 'memo');
        headerTitle.textContent = 'Memoriza esquinas';
        hint.textContent = 'Memorízalas bien antes de continuar';
        btn.textContent = memo.includeEdges ? 'Listo → ver aristas' : 'Listo → empezar test';
        renderMemoDisplay(body, memo.generatedCorners, 'Esquinas');
        return;
      }

      if (memo.phase === 'memo-edges') {
        setMemoBadge('MEMO', 'memo');
        headerTitle.textContent = 'Memoriza aristas';
        hint.textContent = 'Memorízalas bien antes de continuar';
        btn.textContent = 'Listo → empezar test';
        renderMemoDisplay(body, memo.generatedEdges, 'Aristas');
        return;
      }

      if (memo.phase === 'test-edges') {
        setMemoBadge('TEST', 'test');
        headerTitle.textContent = 'Ejecuta aristas';
        hint.textContent = 'Escribe cada letra de memoria';
        btn.style.display = 'none';
        renderMemoTest(body, 'edges');
        return;
      }

      if (memo.phase === 'test-corners') {
        setMemoBadge('TEST', 'test');
        headerTitle.textContent = 'Ejecuta esquinas';
        hint.textContent = 'Escribe cada letra de memoria';
        btn.style.display = 'none';
        renderMemoTest(body, 'corners');
        return;
      }

      if (memo.phase === 'result') {
        setMemoBadge('RESULTADO', 'done');
        headerTitle.textContent = 'Resultado';
        hint.textContent = '';
        btn.textContent = 'Nueva sesión';
        renderMemoResult(body);
      }
    }

    function renderMemoConfig(body) {
      const typeSection = document.createElement('div');
      typeSection.className = 'memo-config-section';
      typeSection.innerHTML = '<div class="memo-config-label">¿Qué practicar?</div>';

      const row = document.createElement('div');
      row.className = 'memo-toggle-row';

      const btnEdges = document.createElement('button');
      btnEdges.className = 'memo-toggle btn-plain' + (memo.includeEdges ? ' active' : '');
      btnEdges.textContent = 'Aristas';
      btnEdges.onclick = () => {
        memo.includeEdges = !memo.includeEdges;
        renderMemo();
      };

      const btnCorners = document.createElement('button');
      btnCorners.className = 'memo-toggle btn-plain' + (memo.includeCorners ? ' active' : '');
      btnCorners.textContent = 'Esquinas';
      btnCorners.onclick = () => {
        memo.includeCorners = !memo.includeCorners;
        renderMemo();
      };

      row.appendChild(btnEdges);
      row.appendChild(btnCorners);
      typeSection.appendChild(row);
      body.appendChild(typeSection);

      if (memo.includeEdges) {
        const sec = document.createElement('div');
        sec.className = 'memo-config-section';
        sec.innerHTML = '<div class="memo-config-label">Letras de aristas</div>';
        sec.appendChild(makeMemoLengthRow('edge', memo.edgeCount, 10, 11));
        body.appendChild(sec);
      }

      if (memo.includeCorners) {
        const sec = document.createElement('div');
        sec.className = 'memo-config-section';
        sec.innerHTML = '<div class="memo-config-label">Letras de esquinas</div>';
        sec.appendChild(makeMemoLengthRow('corner', memo.cornerCount, 6, 7));
        body.appendChild(sec);
      }

      const note = document.createElement('div');
      note.className = 'memo-note';
      note.innerHTML = `
        <b>¿Cómo funciona?</b><br>
        1. Memorizas <b>esquinas</b> → luego <b>aristas</b><br>
        2. Test: escribes <b>aristas</b> de memoria → luego <b>esquinas</b><br>
        3. Ves tu resultado letra por letra
      `;
      body.appendChild(note);
    }

    function makeMemoLengthRow(type, val, min, max) {
      const row = document.createElement('div');
      row.className = 'memo-length-row';

      const label = document.createElement('div');
      label.className = 'memo-length-label';
      label.textContent = 'Cantidad';

      const btnMinus = document.createElement('button');
      btnMinus.className = 'memo-length-btn btn-plain';
      btnMinus.textContent = '−';
      btnMinus.onclick = () => {
        if (type === 'edge') memo.edgeCount = Math.max(min, memo.edgeCount - 1);
        else memo.cornerCount = Math.max(min, memo.cornerCount - 1);
        renderMemo();
      };

      const valEl = document.createElement('div');
      valEl.className = 'memo-length-val';
      valEl.textContent = val;

      const btnPlus = document.createElement('button');
      btnPlus.className = 'memo-length-btn btn-plain';
      btnPlus.textContent = '+';
      btnPlus.onclick = () => {
        if (type === 'edge') memo.edgeCount = Math.min(max, memo.edgeCount + 1);
        else memo.cornerCount = Math.min(max, memo.cornerCount + 1);
        renderMemo();
      };

      row.appendChild(label);
      row.appendChild(btnMinus);
      row.appendChild(valEl);
      row.appendChild(btnPlus);
      return row;
    }

    function renderMemoDisplay(body, pairs, title) {
      const titleEl = document.createElement('div');
      titleEl.className = 'memo-section-title';
      titleEl.textContent = `${title} — ${pairs.length} pares`;
      body.appendChild(titleEl);

      const grid = document.createElement('div');
      grid.className = 'memo-pairs-grid';

      pairs.forEach(([a, b], idx) => {
        const chip = document.createElement('div');
        chip.className = 'memo-pair-chip';
        chip.innerHTML = `
          <span class="pair-num">${idx + 1}</span>
          <span class="pair-letters">${a}<span class="memo-pair-sep"> · </span>${b}</span>
        `;
        grid.appendChild(chip);
      });

      body.appendChild(grid);
    }

    function initMemoTest(phase) {
      const pairs = phase === 'edges' ? memo.generatedEdges : memo.generatedCorners;
      memo.testPhase = phase;
      memo.currentTestPairIdx = 0;
      memo.currentLetterIdx = 0;
      memo.typedLetters = pairs.map(() => ['', '']);
      focusKeyboard();
    }

    function renderMemoTest(body, phase) {
      const pairs = phase === 'edges' ? memo.generatedEdges : memo.generatedCorners;
      const totalLetters = pairs.length * 2;
      const answeredLetters = memo.currentTestPairIdx * 2 + memo.currentLetterIdx;

      const progressRow = document.createElement('div');
      progressRow.className = 'test-progress-row';

      const bar = document.createElement('div');
      bar.className = 'test-progress-bar';

      const fill = document.createElement('div');
      fill.className = 'test-progress-fill';
      fill.style.width = `${totalLetters ? (answeredLetters / totalLetters) * 100 : 0}%`;

      const lbl = document.createElement('div');
      lbl.className = 'test-progress-label';
      lbl.textContent = `${Math.min(memo.currentTestPairIdx + 1, pairs.length)} / ${pairs.length}`;

      bar.appendChild(fill);
      progressRow.appendChild(bar);
      progressRow.appendChild(lbl);
      body.appendChild(progressRow);

      const phaseLbl = document.createElement('div');
      phaseLbl.className = 'test-phase-label';
      phaseLbl.textContent = phase === 'edges' ? '· ARISTAS ·' : '· ESQUINAS ·';
      body.appendChild(phaseLbl);

      const grid = document.createElement('div');
      grid.className = 'test-inputs-grid';

      pairs.forEach(([correctA, correctB], idx) => {
        const typedA = memo.typedLetters[idx][0];
        const typedB = memo.typedLetters[idx][1];
        const isActive = idx === memo.currentTestPairIdx;
        const isDone = idx < memo.currentTestPairIdx;

        const slot = document.createElement('div');
        slot.className = 'test-pair-slot';

        const num = document.createElement('div');
        num.className = 'test-pair-num';
        num.textContent = idx + 1;

        const wrap = document.createElement('div');
        wrap.className = 'test-input-wrap';

        if (isActive) wrap.classList.add('active-slot');
        if (isDone) {
          const ok = typedA.toUpperCase() === correctA && typedB.toUpperCase() === correctB;
          wrap.classList.add(ok ? 'correct' : 'wrong');
        }

        const boxA = document.createElement('div');
        boxA.className = 'test-letter-box';

        if (isDone) {
          boxA.classList.add(typedA.toUpperCase() === correctA ? 'correct-letter' : 'wrong-letter');
          boxA.textContent = typedA || '_';
        } else if (isActive) {
          if (typedA) {
            boxA.textContent = typedA;
          } else if (memo.currentLetterIdx === 0) {
            boxA.innerHTML = '<span style="display:inline-block;width:2px;height:20px;background:rgba(255,255,255,0.7);border-radius:1px;animation:blink 1s step-end infinite"></span>';
          } else {
            boxA.classList.add('empty');
            boxA.textContent = '_';
          }
        } else {
          boxA.classList.add('empty');
          boxA.textContent = '_';
        }

        const sep = document.createElement('div');
        sep.className = 'test-sep';
        sep.textContent = '·';

        const boxB = document.createElement('div');
        boxB.className = 'test-letter-box';

        if (isDone) {
          boxB.classList.add(typedB.toUpperCase() === correctB ? 'correct-letter' : 'wrong-letter');
          boxB.textContent = typedB || '_';
        } else if (isActive && memo.currentLetterIdx === 1) {
          if (typedB) {
            boxB.textContent = typedB;
          } else {
            boxB.innerHTML = '<span style="display:inline-block;width:2px;height:20px;background:rgba(255,255,255,0.7);border-radius:1px;animation:blink 1s step-end infinite"></span>';
          }
        } else {
          boxB.classList.add('empty');
          boxB.textContent = '_';
        }

        wrap.appendChild(boxA);
        wrap.appendChild(sep);
        wrap.appendChild(boxB);

        slot.appendChild(num);
        slot.appendChild(wrap);
        grid.appendChild(slot);
      });

      body.appendChild(grid);

      if (memo.currentTestPairIdx > 0) {
        const lastIdx = memo.currentTestPairIdx - 1;
        const [ca, cb] = pairs[lastIdx];
        const ta = memo.typedLetters[lastIdx][0];
        const tb = memo.typedLetters[lastIdx][1];

        if (!(ta.toUpperCase() === ca && tb.toUpperCase() === cb)) {
          const hint = document.createElement('div');
          hint.className = 'test-answer-row';
          hint.innerHTML = `<span>Par ${lastIdx + 1} correcto:</span><span style="font-size:18px;font-weight:800;color:var(--success)">${ca} · ${cb}</span>`;
          body.appendChild(hint);
        }
      }

      setTimeout(() => {
        const slots = body.querySelectorAll('.test-pair-slot');
        if (slots[memo.currentTestPairIdx]) {
          slots[memo.currentTestPairIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 50);
    }

    function focusKeyboard() {
      const inp = document.getElementById('memoKeyboardCapture');
      inp.value = '';
      inp.focus();
      inp.oninput = handleMemoInput;
      setTimeout(() => inp.focus(), 50);
    }

    function blurKeyboard() {
      const inp = document.getElementById('memoKeyboardCapture');
      inp.blur();
      inp.oninput = null;
    }

    function handleMemoInput(e) {
      const raw = String(e.target.value || '').toUpperCase().replace(/[^A-Z]/g, '');
      if (!raw) return;

      const typedChar = raw.slice(-1);
      e.target.value = '';

      const pairs = memo.testPhase === 'edges' ? memo.generatedEdges : memo.generatedCorners;
      if (memo.currentTestPairIdx >= pairs.length) return;

      memo.typedLetters[memo.currentTestPairIdx][memo.currentLetterIdx] = typedChar;

      if (memo.currentLetterIdx === 0) {
        memo.currentLetterIdx = 1;
      } else {
        memo.currentLetterIdx = 0;
        memo.currentTestPairIdx += 1;

        if (memo.currentTestPairIdx >= pairs.length) {
          finishMemoTest();
          return;
        }
      }

      renderMemo();
      focusKeyboard();
    }

    function finishMemoTest() {
      const pairs = memo.testPhase === 'edges' ? memo.generatedEdges : memo.generatedCorners;
      const results = pairs.map((pair, idx) => {
        const answer = memo.typedLetters[idx];
        const correct = answer[0].toUpperCase() === pair[0] && answer[1].toUpperCase() === pair[1];
        return { pair, answer, correct };
      });

      if (memo.testPhase === 'edges') {
        memo.edgeResults = results;
        if (memo.includeCorners && memo.generatedCorners.length) {
          memo.phase = 'test-corners';
          initMemoTest('corners');
          renderMemo();
          return;
        }
      } else {
        memo.cornerResults = results;
      }

      memo.phase = 'result';
      blurKeyboard();
      renderMemo();
    }

    function renderMemoResult(body) {
      const all = [...memo.edgeResults, ...memo.cornerResults];
      const total = all.length;
      const correct = all.filter(x => x.correct).length;
      const pct = total ? Math.round((correct / total) * 100) : 0;

      const card = document.createElement('div');
      card.className = 'result-score-card';
      card.innerHTML = `
        <div class="result-score-num">${pct}%</div>
        <div class="result-score-label">${correct} de ${total} pares correctos</div>
      `;
      body.appendChild(card);

      if (memo.edgeResults.length) {
        body.appendChild(renderResultSection('Aristas', memo.edgeResults));
      }

      if (memo.cornerResults.length) {
        body.appendChild(renderResultSection('Esquinas', memo.cornerResults));
      }
    }

    function renderResultSection(title, results) {
      const sec = document.createElement('div');
      sec.className = 'result-section';

      const ttl = document.createElement('div');
      ttl.className = 'result-section-title';
      ttl.textContent = title;
      sec.appendChild(ttl);

      const list = document.createElement('div');
      list.className = 'result-pairs-list';

      results.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'result-pair-row ' + (item.correct ? 'correct' : 'wrong');

        const pair = item.pair.join(' · ');
        const ans = item.answer.join(' · ');

        row.innerHTML = `
          <div style="font-size:10px;color:var(--muted);min-width:16px;font-weight:700;">${idx + 1}</div>
          <div class="result-pair-letters">${pair}</div>
          <div class="result-pair-answer">Tu respuesta: ${ans || '—'}</div>
          <div class="result-pair-icon">${item.correct ? '✓' : '✕'}</div>
        `;
        list.appendChild(row);
      });

      sec.appendChild(list);
      return sec;
    }

    function memoAction() {
      if (memo.phase === 'config') {
        if (!memo.includeEdges && !memo.includeCorners) return;

        memo.generatedEdges = memo.includeEdges
          ? generatePairs(MEMO_EDGES_LETTERS, edgePairForbidden, memo.edgeCount)
          : [];

        memo.generatedCorners = memo.includeCorners
          ? generatePairs(MEMO_CORNERS_LETTERS, cornerPairForbidden, memo.cornerCount)
          : [];

        memo.edgeResults = [];
        memo.cornerResults = [];

        memo.phase = (memo.includeCorners && memo.generatedCorners.length) ? 'memo-corners' : 'memo-edges';
        renderMemo();
        return;
      }

      if (memo.phase === 'memo-corners') {
        if (memo.includeEdges && memo.generatedEdges.length) {
          memo.phase = 'memo-edges';
          renderMemo();
        } else {
          memo.phase = 'test-corners';
          initMemoTest('corners');
          renderMemo();
        }
        return;
      }

      if (memo.phase === 'memo-edges') {
        memo.phase = 'test-edges';
        initMemoTest('edges');
        renderMemo();
        return;
      }

      if (memo.phase === 'result') {
        memo.phase = 'config';
        renderMemo();
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
